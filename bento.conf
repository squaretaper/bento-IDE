# ── bento.conf ─────────────────────────────────────────────────────
# Bento IDE configuration.  Sourced by the `bento` launcher and
# individual widget scripts.  Shell syntax — this file is sourced
# directly, so keep values simple (no arrays, no pipes).
#
# After editing, restart bento or the individual widget pane to
# pick up changes.
# ───────────────────────────────────────────────────────────────────

# ── Layout ────────────────────────────────────────────────────────
# Column widths in character cells.  The center pane (editor + shell)
# takes all remaining space.  Set to 0 to hide a side column entirely.
BENTO_YAZI_WIDTH=28
BENTO_WIDGET_WIDTH=34

# Vertical split ratios inside the center column (editor : shell).
# Percentages as integers — they don't need to sum to 100, zellij
# normalises them.
BENTO_EDITOR_PCT=36
BENTO_SHELL_PCT=63

# Widget column vertical splits (bmon : smon : bgit : cava).
# Same rules — zellij normalises the ratios.
BENTO_BMON_PCT=44
BENTO_SMON_PCT=24
BENTO_BGIT_PCT=20
BENTO_CAVA_PCT=12

# ── Editor ────────────────────────────────────────────────────────
# Which editor to open files in from yazi.  The yazi-open bridge
# sends keystrokes to the editor pane — currently only "micro" is
# wired up.  Set to "micro" (default) or "nvim" (experimental).
BENTO_EDITOR=micro

# ── Remote machine (smon + sftp) ─────────────────────────────────
# Hostname or IP of a remote machine to monitor with smon and
# browse via yazi's SFTP.  Leave empty to disable smon (the pane
# shows "no remote configured").
#
# The remote machine must be running Glances with its REST API
# enabled:  glances -w --disable-webui
BENTO_REMOTE_HOST=
BENTO_REMOTE_PORT=61208
BENTO_REMOTE_USER=

# Constructed automatically — override to use a non-default API path.
# BENTO_REMOTE_API=http://${BENTO_REMOTE_HOST}:${BENTO_REMOTE_PORT}/api/4

# ── smon ──────────────────────────────────────────────────────────
# Display name shown in the smon header (defaults to hostname).
BENTO_REMOTE_LABEL=

# Poll interval in seconds.
BENTO_SMON_INTERVAL=3

# ── bmon ──────────────────────────────────────────────────────────
# Local monitor poll interval in seconds.
BENTO_BMON_INTERVAL=2

# Color thresholds for CPU and memory gauges.
# Below LOW = green, LOW–HIGH = yellow, above HIGH = red.
BENTO_CPU_WARN=60
BENTO_CPU_CRIT=85

# Temperature thresholds (°C) for the thermal zone bars.
BENTO_TEMP_WARN=55
BENTO_TEMP_CRIT=75

# ── bgit ──────────────────────────────────────────────────────────
# Poll interval in seconds.
BENTO_BGIT_INTERVAL=3

# ── cava ──────────────────────────────────────────────────────────
# Path to cava binary.  If not found, bcava shows a placeholder.
BENTO_CAVA_BIN=cava

# ── Session ───────────────────────────────────────────────────────
# Zellij session name.  Bento attaches to this session if it already
# exists, or creates it with the bento layout.
BENTO_SESSION=bento

# ── Theme ────────���────────────────────────────────��───────────────
# Zellij theme name.  Must be a theme installed in your zellij
# themes directory (~/.config/zellij/themes/) or a zellij built-in.
# Leave empty to use the zellij default.  The widget scripts use
# standard ANSI colors, so they adapt to any terminal palette.
# BENTO_THEME=

# Minimum terminal width (columns) before the launcher warns.
BENTO_MIN_COLS=100
